jumping-mine=Lancia un proiettile esplosivo al nemico più vicino nel raggio di rilevamento, poi si autodistrugge.\nLa portata del salto e la velocità di armamento possono essere migliorate tramite ricerca.

[item-description]
jumping-mine=Lancia un proiettile esplosivo al nemico più vicino nel raggio di rilevamento, poi si autodistrugge.\nLa portata del salto e la velocità di armamento possono essere migliorate tramite ricerca.

[technology-description]
jumping-mines=Sblocca la Mina Saltante. Portata del salto: 5 celle. Tempo di armamento: 1,0 sec.
jumping-mines-range=Aumenta il raggio di rilevamento nemico di 2 celle.
jumping-mines-activation=Riduce il tempo di armamento delle mine di 0,1 sec.
jumping-mines-range-upgrade=Aumenta il raggio di rilevamento nemico di 2.
