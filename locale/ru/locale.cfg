[jumping-mines-info]
overview_text=Прыгающие Мины обнаруживают ближайших врагов и запускают в них взрывной снаряд. После исследования Постоянного режима мины выживают после выстрела и перезаряжаются вместо самоуничтожения. Кнопка в панели инструментов переключает режим для всей фракции. Параметры баланса и производительности — на странице Настройки мода.

mines_header=Каждый тип мины имеет уникальный снаряд, профиль урона и базовое время перезарядки (в постоянном режиме).
mines_header_no_persistent=Каждый тип мины имеет уникальный снаряд и профиль урона.

mine_basic=Обычная Прыгающая Мина — КД 5с. Оглушает врагов при попадании.
mine_flame=Огненная Прыгающая Мина — КД 10с. Создаёт зону огня и замедляет врагов на 80%. Получает бонус урона от исследований огнемёта.
mine_nuclear=Ядерная Прыгающая Мина — КД 15с. Массивный ядерный взрыв, +10 клеток к дальности обнаружения.
mine_cryo=Крио Прыгающая Мина — КД 10с. Создаёт ледяные стены и замедляет врагов на 75%.
mine_tritium=Тритиевая Прыгающая Мина — КД 20с. Разрушительный ядерный взрыв, +15 клеток к дальности.
mine_antimatter=Антиматериевая Прыгающая Мина — КД 30с. Катастрофический взрыв материи, +20 клеток к дальности.

mine_basic_no_persistent=Обычная Прыгающая Мина. Оглушает врагов при попадании.
mine_flame_no_persistent=Огненная Прыгающая Мина. Создаёт зону огня и замедляет врагов на 80%. Получает бонус урона от исследований огнемёта.
mine_nuclear_no_persistent=Ядерная Прыгающая Мина. Массивный ядерный взрыв, +10 клеток к дальности обнаружения.
mine_cryo_no_persistent=Крио Прыгающая Мина. Создаёт ледяные стены и замедляет врагов на 75%.
mine_tritium_no_persistent=Тритиевая Прыгающая Мина. Разрушительный ядерный взрыв, +15 клеток к дальности.
mine_antimatter_no_persistent=Антиматериевая Прыгающая Мина. Катастрофический взрыв материи, +20 клеток к дальности.

upgrades_text=Все улучшения исследуются независимо и применяются ко всем типам мин.
upgrade_range=• Дальность (10 уровней): +2 клетки за уровень. Начальная дальность настраивается в Настройках мода (по умолчанию 5), макс 25 клеток.
upgrade_arm=• Скорость активации (9 уровней): −0,1с за уровень. Базово 1,0с, мин 0,1с.
upgrade_persistent=• Постоянный режим: Мины выживают после выстрела и уходят на перезарядку. Можно отключить в Настройках мода.
upgrade_cooldown=• Скорость перезарядки (9 уровней): −5% за уровень. Макс −45%, минимум 10% от базового КД.

settings_header=Параметры задаются в меню Настройки → Моды (до начала мира). Требуют перезапуска.
settings_persistent=• Включить Постоянный режим (по умолчанию: вкл) — если выключено, технология и кнопка тулбара полностью скрыты. Для тех, кто считает режим слишком сильным.
settings_damage=• Множитель урона (по умолчанию: 1.0) — масштабирует урон всех снарядов мин. Меньше 1.0 — меньше урона, больше 1.0 — больше.
settings_range=• Начальная дальность (по умолчанию: 5) — базовая дальность обнаружения в клетках до исследований.
settings_batch=• Мин за тик (по умолчанию: 100) — сколько мин проверяется каждый тик. Можно менять без перезапуска. Снижайте при просадках UPS на больших картах.

