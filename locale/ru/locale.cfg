jm-enable-persistent=Если отключено — технология Постоянного режима и кнопка в тулбаре скрыты. Для более сбалансированного прохождения.
jm-damage-modifier=Множитель применяется к урону всех снарядов мин. По умолчанию: 1.0. Меньшее значение снижает урон для баланса.
jm-base-range=Базовая дальность обнаружения врагов в клетках до исследований. По умолчанию: 5.
jm-batch-size=Сколько мин проверяется за тик. Больше = быстрее реакция, но дороже по UPS. По умолчанию: 100. Можно менять без перезапуска.

