[entity-description]
jumping-mine=Запускает взрывной снаряд в ближайшего врага, после чего самоуничтожается. При исследовании постоянного режима — выживает и перезаряжается.
jumping-flame-mine=Запускает огненный снаряд, создающий область пламени и замедляющий врагов на 80%. Не станит.
jumping-nuclear-mine=Запускает ядерный снаряд с огромным радиусом взрыва (+10 клеток к дальности).
jumping-cryo-mine=Запускает крио-снаряд, создающий ледяные стены и замедляющий врагов на 75%.
jumping-tritium-mine=Запускает тритиевый снаряд с разрушительным уроном (+15 клеток к дальности).
jumping-antimatter-mine=Запускает антиматериевый снаряд с катастрофическими разрушениями (+20 клеток к дальности).

