[technology-description]
jumping-mines=Разблокирует Прыгающую Мину. Дальность прыжка: 5 клеток. Время активации: 1,0 сек.
jumping-mines-range=Увеличивает дальность обнаружения врагов на 2 клетки.
jumping-mines-activation=Уменьшает время активации мин на 0,1 сек.
jumping-flame-mines=Разблокирует Огненную Прыгающую Мину. Создаёт зону огня и замедляет врагов на 80%.
jumping-nuclear-mines=Разблокирует Ядерную Прыгающую Мину. Огромный взрыв с +10 клетками к дальности.
jumping-cryo-mines=Разблокирует Крио Прыгающую Мину. Создаёт ледяные стены и замедляет врагов на 75%.
jumping-tritium-mines=Разблокирует Тритиевую Прыгающую Мину. Разрушительный ядерный взрыв с +15 клетками к дальности.
jumping-antimatter-mines=Разблокирует Антиматериевую Прыгающую Мину. Катастрофические разрушения с +20 клетками к дальности.
jumping-mines-persistent=Мины больше не самоуничтожаются после выстрела. Вместо этого они уходят на перезарядку и могут стрелять снова. Базовые КД: Обычная 5с, Огонь/Крио 10с, Ядерная 15с, Тритий 20с, Антиматерия 30с.
jumping-mines-cooldown-upgrade=Уменьшает КД перезарядки каждой мины на 5% (9 уровней = −45%, минимум 10% от базы).
jumping-mines-range-upgrade=Увеличивает дальность обнаружения врагов на 2.
jumping-mines-activation-upgrade=Уменьшает время активации мин на 0,1.
