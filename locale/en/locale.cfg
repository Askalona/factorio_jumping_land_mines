[jumping-mines-info]
overview_text=Jumping Mines detect nearby enemies and launch an explosive projectile at them. After researching Persistent Mode, mines survive firing and reload instead of self-destructing. Use the shortcut button in the toolbar to toggle persistent mode on or off for your entire force. See the Mod Settings page for balance and performance options.

mines_header=Each mine type has a unique projectile, damage profile, and base reload cooldown (in persistent mode).
mines_header_no_persistent=Each mine type has a unique projectile and damage profile.

mine_basic=Basic Jumping Mine — 5s cooldown. Stuns enemies on impact.
mine_flame=Flame Jumping Mine — 10s cooldown. Creates a fire area and slows enemies 80%. Benefits from Flamethrower damage research.
mine_nuclear=Nuclear Jumping Mine — 15s cooldown. Massive nuclear explosion, +10 tile detection range bonus.
mine_cryo=Cryo Jumping Mine — 10s cooldown. Creates ice walls and slows enemies 75%.
mine_tritium=Tritium Jumping Mine — 20s cooldown. Devastating nuclear-tier explosion, +15 tile range bonus.
mine_antimatter=Antimatter Jumping Mine — 30s cooldown. Catastrophic matter explosion, +20 tile range bonus.

mine_basic_no_persistent=Basic Jumping Mine. Stuns enemies on impact.
mine_flame_no_persistent=Flame Jumping Mine. Creates a fire area and slows enemies 80%. Benefits from Flamethrower damage research.
mine_nuclear_no_persistent=Nuclear Jumping Mine. Massive nuclear explosion, +10 tile detection range bonus.
mine_cryo_no_persistent=Cryo Jumping Mine. Creates ice walls and slows enemies 75%.
mine_tritium_no_persistent=Tritium Jumping Mine. Devastating nuclear-tier explosion, +15 tile range bonus.
mine_antimatter_no_persistent=Antimatter Jumping Mine. Catastrophic matter explosion, +20 tile range bonus.

upgrades_text=All upgrades are researched independently and apply to all mine types.
upgrade_range=• Range (10 levels): +2 tiles per level. Base range configurable in Mod Settings (default 5), max 25 tiles.
upgrade_arm=• Arming Speed (9 levels): −0.1s per level. Base 1.0s, min 0.1s.
upgrade_persistent=• Persistent Mode: Mines survive firing and enter a reload cooldown. Can be disabled in Mod Settings.
upgrade_cooldown=• Reload Speed (9 levels): −5% per level. Max −45%, minimum 10% of base cooldown.

settings_header=These options are set in the Mod Settings menu (before starting a world). Require a restart to apply.
settings_persistent=• Enable Persistent Mode (default: on) — if disabled, the Persistent Mode technology and toolbar shortcut are hidden entirely. Recommended for players who find it too powerful.
settings_damage=• Damage Multiplier (default: 1.0) — scales all mine projectile damage. Set below 1.0 to reduce damage for better balance, above 1.0 to increase.
settings_range=• Starting Range (default: 5) — base enemy detection range in tiles before any research. Increase for larger default threat radius.
settings_batch=• Mines Per Tick (default: 100) — how many mines are scanned each game tick. Can be changed without restarting. Lower values reduce UPS cost on very large maps.

[shortcut-name]
jumping-mines-persistent-toggle=Jumping Mines: Persistent Mode

[shortcut-description]
jumping-mines-persistent-toggle=Toggle persistent mode for all Jumping Mines.\nON — mines survive firing and reload.\nOFF — mines self-destruct after firing.

