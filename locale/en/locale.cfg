jumping-mine=Launches an explosive projectile at the nearest enemy, then self-destructs. With Persistent Mode researched: survives and reloads instead.
jumping-flame-mine=Launches a flame projectile that creates a fire area and slows enemies 80%. Does not stun.
jumping-nuclear-mine=Launches a nuclear projectile with massive blast radius (+10 tile range bonus).
jumping-cryo-mine=Launches a cryo projectile that creates ice walls and slows enemies 75%.
jumping-tritium-mine=Launches a tritium-powered projectile with devastating area damage (+15 tile range bonus).
jumping-antimatter-mine=Launches an antimatter projectile with catastrophic area destruction (+20 tile range bonus).

