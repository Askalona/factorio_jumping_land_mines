[mod-setting-description]
jm-enable-persistent=If disabled, the Persistent Mode technology and toolbar shortcut are hidden. Useful for a more balanced experience.
jm-damage-modifier=Multiplier applied to all mine projectile damage. Default: 1.0. Lower values reduce damage for better balance.
jm-base-range=Base enemy detection range in tiles before any research upgrades. Default: 5.
jm-batch-size=How many mines are scanned per tick. Higher = faster reaction but more UPS cost. Default: 100. Can be changed without restarting.

