[technology-description]
jumping-mines=Unlocks the Jumping Mine. Jump range: 5 tiles. Arming time: 1.0 sec.
jumping-mines-range=Increases enemy detection range by 2 tiles.
jumping-mines-activation=Reduces mine arming time by 0.1 sec.
jumping-flame-mines=Unlocks the Flame Jumping Mine. Creates persistent fire areas and slows enemies 80%.
jumping-nuclear-mines=Unlocks the Nuclear Jumping Mine. Massive explosion with +10 tile range bonus.
jumping-cryo-mines=Unlocks the Cryo Jumping Mine. Creates ice walls and slows enemies 75%.
jumping-tritium-mines=Unlocks the Tritium Jumping Mine. Devastating nuclear-tier explosion with +15 tile range bonus.
jumping-antimatter-mines=Unlocks the Antimatter Jumping Mine. Catastrophic destruction with +20 tile range bonus.
jumping-mines-persistent=Mines no longer self-destruct after firing. Instead they enter a reload cooldown and can fire again. Base cooldowns: Basic 5s, Flame/Cryo 10s, Nuclear 15s, Tritium 20s, Antimatter 30s.
jumping-mines-cooldown-upgrade=Reduces each mine's reload cooldown by 5% (9 levels = −45%, minimum 10% of base).
jumping-mines-range-upgrade=Increases enemy detection range by 2.
jumping-mines-activation-upgrade=Reduces mine arming time by 0.1.
