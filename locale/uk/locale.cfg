[entity-description]
jumping-mine=Запускає вибуховий снаряд у найближчого ворога, після чого самознищується. При дослідженні постійного режиму — виживає і перезаряджається.
jumping-flame-mine=Запускає вогняний снаряд, що створює область полум'я та уповільнює ворогів на 80%. Не приголомшує.
jumping-nuclear-mine=Запускає ядерний снаряд з величезним радіусом вибуху (+10 клітин до дальності).
jumping-cryo-mine=Запускає кріо-снаряд, що створює крижані стіни та уповільнює ворогів на 75%.
jumping-tritium-mine=Запускає тритієвий снаряд з руйнівною шкодою (+15 клітин до дальності).
jumping-antimatter-mine=Запускає антиматеріальний снаряд з катастрофічними руйнуваннями (+20 клітин до дальності).

[item-description]
jumping-mine=Запускає вибуховий снаряд у найближчого ворога, після чого самознищується. При дослідженні постійного режиму — виживає і перезаряджається.
