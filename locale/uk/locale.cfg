[technology-description]
jumping-mines=Розблоковує Стрибаючу Міну. Дальність стрибка: 5 клітин. Час активації: 1,0 сек.
jumping-mines-range=Збільшує дальність виявлення ворогів на 2 клітини.
jumping-mines-activation=Зменшує час активації мін на 0,1 сек.
jumping-flame-mines=Розблоковує Вогняну Стрибаючу Міну. Створює зону вогню та уповільнює ворогів на 80%.
jumping-nuclear-mines=Розблоковує Ядерну Стрибаючу Міну. Масивний вибух з +10 клітинами до дальності.
jumping-cryo-mines=Розблоковує Кріо Стрибаючу Міну. Створює крижані стіни та уповільнює ворогів на 75%.
jumping-tritium-mines=Розблоковує Тритієву Стрибаючу Міну. Руйнівний ядерний вибух з +15 клітинами до дальності.
jumping-antimatter-mines=Розблоковує Антиматеріальну Стрибаючу Міну. Катастрофічні руйнування з +20 клітинами до дальності.
jumping-mines-persistent=Міни більше не самознищуються після пострілу. Замість цього вони йдуть на перезарядку і можуть стріляти знову. Базові КД: Звичайна 5с, Вогонь/Кріо 10с, Ядерна 15с, Тритій 20с, Антиматерія 30с.
jumping-mines-cooldown-upgrade=Зменшує КД перезарядки кожної міни на 5% (9 рівнів = −45%, мінімум 10% від бази).
jumping-mines-range-upgrade=Збільшує дальність виявлення ворогів на 2.
jumping-mines-activation-upgrade=Зменшує час активації мін на 0,1.
