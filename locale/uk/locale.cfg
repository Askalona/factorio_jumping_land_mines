[jumping-mines-info]
overview_text=Стрибаючі Міни виявляють найближчих ворогів і запускають у них вибуховий снаряд. Після дослідження Постійного режиму міни виживають після пострілу і перезаряджаються замість самознищення. Кнопка на панелі інструментів перемикає режим для всієї фракції. Параметри балансу та продуктивності — на сторінці Налаштування мода.

mines_header=Кожен тип міни має унікальний снаряд, профіль шкоди та базовий час перезарядки (у постійному режимі).
mines_header_no_persistent=Кожен тип міни має унікальний снаряд і профіль шкоди.

mine_basic=Звичайна Стрибаюча Міна — КД 5с. Приголомшує ворогів при влученні.
mine_flame=Вогняна Стрибаюча Міна — КД 10с. Створює зону вогню та уповільнює ворогів на 80%. Отримує бонус шкоди від досліджень вогнемета.
mine_nuclear=Ядерна Стрибаюча Міна — КД 15с. Масивний ядерний вибух, +10 клітин до дальності виявлення.
mine_cryo=Кріо Стрибаюча Міна — КД 10с. Створює крижані стіни та уповільнює ворогів на 75%.
mine_tritium=Тритієва Стрибаюча Міна — КД 20с. Руйнівний ядерний вибух, +15 клітин до дальності.
mine_antimatter=Антиматеріальна Стрибаюча Міна — КД 30с. Катастрофічний вибух матерії, +20 клітин до дальності.

mine_basic_no_persistent=Звичайна Стрибаюча Міна. Приголомшує ворогів при влученні.
mine_flame_no_persistent=Вогняна Стрибаюча Міна. Створює зону вогню та уповільнює ворогів на 80%. Отримує бонус шкоди від досліджень вогнемета.
mine_nuclear_no_persistent=Ядерна Стрибаюча Міна. Масивний ядерний вибух, +10 клітин до дальності виявлення.
mine_cryo_no_persistent=Кріо Стрибаюча Міна. Створює крижані стіни та уповільнює ворогів на 75%.
mine_tritium_no_persistent=Тритієва Стрибаюча Міна. Руйнівний ядерний вибух, +15 клітин до дальності.
mine_antimatter_no_persistent=Антиматеріальна Стрибаюча Міна. Катастрофічний вибух матерії, +20 клітин до дальності.

upgrades_text=Усі покращення досліджуються незалежно і застосовуються до всіх типів мін.
upgrade_range=• Дальність (10 рівнів): +2 клітини за рівень. Початкова дальність налаштовується в Налаштуваннях мода (за замовчуванням 5), макс 25 клітин.
upgrade_arm=• Швидкість активації (9 рівнів): −0,1с за рівень. Базово 1,0с, мін 0,1с.
upgrade_persistent=• Постійний режим: Міни виживають після пострілу і йдуть на перезарядку. Можна вимкнути в Налаштуваннях мода.
upgrade_cooldown=• Швидкість перезарядки (9 рівнів): −5% за рівень. Макс −45%, мінімум 10% від базового КД.

settings_header=Параметри задаються в меню Налаштування → Моди (до початку світу). Потребують перезапуску.
settings_persistent=• Увімкнути Постійний режим (за замовчуванням: увімк) — якщо вимкнено, технологія та кнопка панелі інструментів повністю приховані. Для тих, хто вважає режим надто сильним.
settings_damage=• Множник шкоди (за замовчуванням: 1.0) — масштабує шкоду всіх снарядів мін. Менше 1.0 — менше шкоди, більше 1.0 — більше.
settings_range=• Початкова дальність (за замовчуванням: 5) — базова дальність виявлення у клітинах до досліджень.
settings_batch=• Мін за тік (за замовчуванням: 100) — скільки мін перевіряється кожен тік. Можна змінювати без перезапуску. Зменшуйте при просіданнях UPS на великих картах.

